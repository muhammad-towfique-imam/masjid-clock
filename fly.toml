# fly.toml app configuration file generated for masjid-clock on 2026-03-11T03:18:41+06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'masjid-clock'
primary_region = 'sin'

[build]

[env]
  PORT = '8080'
  ROCKET_ADDRESS = '0.0.0.0'
  ROCKET_PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '128mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
